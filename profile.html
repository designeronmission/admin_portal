<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROJA – Profile Settings</title>
    <!-- Fonts & Base CSS -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
    <!-- Bootstrap + fontawesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="responsive.css" />
</head>
<body>
    <div id="main-wrapper">

         <!-- Minimal header replica from ROJA design (clean) -->
        <header id="header" class="border-bottom-0">
            <div class="container">
                <div class="header-row">
                    <div class="header-column justify-content-start">
                        <!-- Logo with embossed effect -->
                        <div class="logo me-4 position-relative">
                            <a class="d-flex" href="#">
                                <img src="vendor/images/roja-org.png" alt="Roja-logo" style="height:50px;"
                                    class="position-relative" style="filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));">
                            </a>
                            <!-- Embossed highlight effect -->
                            <div class="position-absolute top-0 start-0 w-100 h-100"
                                style="background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%); pointer-events: none; border-radius: 4px;">
                            </div>
                        </div>
                    </div>

                    <!-- Centered Navigation with Icons -->
                    <div class="header-column justify-content-center">
                        <nav class="primary-menu navbar navbar-expand-lg">
                            <div id="header-nav" class="collapse navbar-collapse">
                                <ul class="navbar-nav">
                                    <li class="nav-item">
                                        <a class="nav-link" href="index.html">
                                            <i class="fas fa-chart-pie me-1"></i>
                                            <span>Dashboard</span>
                                        </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="#">
                                            <i class="fas fa-lightbulb me-1"></i>
                                            <span>Insights</span>
                                        </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="budget.html">
                                            <i class="fas fa-wallet me-1"></i>
                                            <span>Budget</span>
                                        </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="goals.html">
                                            <i class="fas fa-bullseye me-1"></i>
                                            <span>Goals</span>
                                        </a>
                                    </li>
                                    <li class="nav-item">
                                        <a class="nav-link" href="offers.html">
                                            <i class="fas fa-tag me-1"></i>
                                            <span>Offers</span>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </nav>
                    </div>

                    <div class="header-column justify-content-end">
                        <nav class="login-signup navbar navbar-expand">
                            <ul class="navbar-nav align-items-center">
                                    <li class="dropdown notifications">
                                    <a class="dropdown-toggle" href="push-notifications.html">
                                        <span class="text-5"><i class="far fa-bell"></i></span>
                                        <span class="count">11</span>
                                    </a>
                                </li>

                                <!-- Settings Dropdown (with Profile inside) -->
                                <li class="dropdown settings ms-2">
                                    <a class="dropdown-toggle" href="settings.html">
                                        <span class="text-5"><i class="fas fa-cog"></i></span>
                                    </a>
                                </li>
                            </ul>
                        </nav>

                        <!-- Mobile Menu Button -->
                        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                            data-bs-target="#header-nav">
                            <span></span>
                            <span></span>
                            <span></span>
                        </button>
                    </div>

                </div>
            </div>
        </header>

        <div id="content" class="py-4">
            <div class="container">
                <!-- Header with Breadcrumbs -->
                <div class="d-flex align-items-center flex-wrap justify-content-between mb-4 background-blue">
                    <div class="d-flex align-items-center">
                        <h2 class="text-4 fw-500 mb-0 text-light"><i class="fas fa-user-circle text-light me-2"></i> Profile Settings</h2>
                    </div>
                    <div class="d-flex align-items-center">
                        <a href="index.html"><span class="text-light opacity-75">Dashboard</span></a>
                       <a href="settings.html"><i class="fas fa-chevron-right text-light opacity-60 mx-2" style="font-size: 0.7rem;"></i>
                        <span class="text-light fw-500">Settings</span></a> 
                        <i class="fas fa-chevron-right text-light opacity-50 mx-2" style="font-size: 0.7rem;"></i>
                        <span class="text-light fw-500">Profile</span>
                    </div>
                </div>

                <div class="row g-4">
                    <!-- Left Sidebar - Profile & Account Options -->
                    <div class="col-lg-4">
                        <!-- Profile Card -->
                        <div class="bg-white shadow-sm rounded-4 p-4 mb-4 text-center">
                            <div class="position-relative d-inline-block mb-3">
                                <img class="rounded-circle img-fluid" src="vendor/images/profile-1.png" alt="Profile" style="width: 120px; height: 120px; object-fit: cover; border: 3px solid #131d58;">
                                <label class="position-absolute bottom-0 end-0 bg-primary rounded-circle p-2" style="cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">
                                    <i class="fas fa-camera text-white text-2"></i>
                                    <input type="file" class="position-absolute opacity-0" style="width: 100%; height: 100%; cursor: pointer;">
                                </label>
                            </div>
                            <h4 class="fw-600 mb-1">John Snow</h4>
                            <p class="text-muted mb-0">Premium Member</p>
                        </div>
                    </div>

                    <!-- Right Side - Profile Form -->
                    <div class="col-lg-8">
                        <div class="bg-white shadow-sm rounded-4 p-4">
                            <h5 class="fw-600 mb-4">Personal Information</h5>
                            
                            <form>
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-500">First Name <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control rounded-pill" value="John" placeholder="Enter first name">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-500">Last Name <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control rounded-pill" value="Snow" placeholder="Enter last name">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-500">ID <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control rounded-pill" value="ROJ123456" placeholder="Enter ID">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-500">Cell Phone Number <span class="text-danger">*</span></label>
                                        <input type="tel" class="form-control rounded-pill" value="+1 234 567 8900" placeholder="Enter phone number">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-500">Date of Birth <span class="text-danger">*</span></label>
                                        <input type="date" class="form-control rounded-pill" value="1990-01-15">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label fw-500">Email <span class="text-danger">*</span></label>
                                        <input type="email" class="form-control rounded-pill" value="john.snow@email.com" placeholder="Enter email">
                                    </div>
                                    <div class="col-12">
                                        <label class="form-label fw-500">Address <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control rounded-pill" value="123 Main Street" placeholder="Enter street address">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-500">State <span class="text-danger">*</span></label>
                                        <select class="form-select rounded-pill">
                                            <option>California</option>
                                            <option>Texas</option>
                                            <option>New York</option>
                                            <option>Florida</option>
                                            <option>Illinois</option>
                                        </select>
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-500">City <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control rounded-pill" value="Los Angeles" placeholder="Enter city">
                                    </div>
                                    <div class="col-md-4">
                                        <label class="form-label fw-500">ZIP Code <span class="text-danger">*</span></label>
                                        <input type="text" class="form-control rounded-pill" value="90001" placeholder="Enter ZIP code">
                                    </div>
                                </div>

                                <div class="d-flex gap-3 justify-content-end mt-4 pt-3">
                                    <button type="button" class="btn btn-outline-secondary rounded-pill px-4">Cancel</button>
                                    <button type="submit" class="btn btn-primary rounded-pill px-4">Update Profile</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <footer id="footer">
            <div class="container">
                <div class="footer-copyright">
                    <div class="row">
                        <div class="col-lg">
                            <p class="text-center text-lg-start mb-0">Copyright &copy; 2025 ROJA. All Rights Reserved.</p>
                        </div>
                        <div class="col-lg d-lg-flex justify-content-lg-end">
                            <ul class="nav justify-content-center">
                                <li class="nav-item"><a class="nav-link" href="privacy-policy.html">Privacy</a></li>
                                <li class="nav-item"><a class="nav-link" href="terms-of-use.html">Terms</a></li>
                                <li class="nav-item"><a class="nav-link" href="#">Support</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </footer>
        <a id="back-to-top" href="#" class="shadow-sm"><i class="fa fa-chevron-up"></i></a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var btt = document.getElementById('back-to-top');
            window.addEventListener('scroll', function() {
                btt.style.display = window.scrollY > 300 ? 'block' : 'none';
            });
            btt.addEventListener('click', function(e) {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
