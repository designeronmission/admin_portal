<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Bill</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600&family=Roboto:wght@600&display=swap" rel="stylesheet">
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Roboto', sans-serif;
    padding: 20px;
    background-color: #f0f0f0;
}

.frame-container {
    max-width: 640px;
    height: 140px;
    margin: 0 auto;
}

/* Main Card */
.card {
    position: relative;
    width: 100%;
    height: 100%;
    background-color: #f7feff;
    border: 1px solid #d4e9ec;
    border-radius: 14px;
}

/* Title */
.title {
    position: absolute;
    left: 25px;
    top: 26px;
    width: 174px;
    font-family: 'Roboto', sans-serif;
    font-weight: 600;
    font-size: 25px;
    line-height: normal;
    color: #120d1c;
}

/* Date */
.date {
    position: absolute;
    left: 25px;
    top: 65px;
    width: 156px;
    font-family: 'Roboto', sans-serif;
    font-weight: 600;
    font-size: 20px;
    line-height: normal;
    color: #6a6a6a;
}

/* Account Info */
.account {
    position: absolute;
    left: 25px;
    top: 98px;
    width: 127px;
    font-family: 'Roboto', sans-serif;
    font-weight: 600;
    font-size: 16px;
    line-height: normal;
    color: #9e9e9e;
}

/* Amount */
.amount-container {
    position: absolute;
    left: 494px;
    top: 23px;
    width: 105px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.amount {
    font-family: 'Roboto', sans-serif;
    font-weight: 600;
    font-size: 30px;
    line-height: normal;
    color: #120d1c;
    text-align: center;
    width: 109px;
}

/* Pending Badge */
.pending-group {
    position: absolute;
    left: 212px;
    top: 25.69px;
    width: 89.349px;
    height: 29.281px;
}

.pending-badge {
    position: absolute;
    left: 1px;
    top: 1px;
    width: 89.349px;
    height: 29.281px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.pending-bg {
    background-color: #ffeded;
    height: 28.969px;
    width: 89.249px;
    border-radius: 60px;
    transform: rotate(-0.2deg);
}

.pending-text-wrapper {
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    width: 60.186px;
    height: 16.981px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.pending-text-inner {
    transform: rotate(-0.2deg);
}

.pending-text {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    line-height: normal;
    color: #ce5b5b;
    white-space: nowrap;
}

/* Mark as Paid Button */
.mark-paid-group {
    position: absolute;
    left: 428px;
    top: 79px;
    width: 181.186px;
    height: 37.843px;
}

.mark-paid-bg {
    position: absolute;
    left: 1px;
    top: 1px;
    background-color: #f1ffed;
    height: 37.211px;
    width: 181.058px;
    border-radius: 60px;
    transform: rotate(-0.2deg);
}

.tick-circle-icon {
    position: absolute;
    left: 25px;
    top: 7.63px;
    width: 24px;
    height: 24px;
}

.tick-circle-icon svg {
    display: block;
    width: 100%;
    height: 100%;
}

.mark-paid-text-wrapper {
    position: absolute;
    left: 57px;
    top: 50%;
    transform: translateY(-50%);
    width: 106.684px;
    height: 17.144px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.mark-paid-text-inner {
    transform: rotate(-0.2deg);
}

.mark-paid-text {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 17px;
    line-height: normal;
    color: #246935;
    white-space: nowrap;
}

/* Responsive adjustments (optional) */
@media (max-width: 700px) {
    .frame-container {
        max-width: 100%;
    }
    
    .card {
        overflow-x: auto;
    }
}

    </style>
</head>
<body>
    <div class="frame-container">
        <!-- Main Card -->
        <div class="card">
            <!-- Title -->
            <p class="title">Credit Card Bill</p>
            
            <!-- Date -->
            <p class="date">19th March 2026</p>
            
            <!-- Account Info -->
            <p class="account">Savings (**9809)</p>
            
            <!-- Amount -->
            <div class="amount-container">
                <p class="amount">$56.00</p>
            </div>
            
            <!-- Pending Badge -->
            <div class="pending-group">
                <div class="pending-badge">
                    <div class="pending-bg"></div>
                </div>
                <div class="pending-text-wrapper">
                    <div class="pending-text-inner">
                        <p class="pending-text">Pending</p>
                    </div>
                </div>
            </div>
            
            <!-- Mark as Paid Button -->
            <div class="mark-paid-group">
                <div class="mark-paid-bg"></div>
                
                <!-- Tick Circle Icon -->
                <div class="tick-circle-icon">
                    <svg fill="none" preserveAspectRatio="none" viewBox="0 0 24 24">
                        <g>
                            <path d="M12 2C6.5 2 2 6.5 2 12C2 17.5 6.5 22 12 22C17.5 22 22 17.5 22 12C22 6.5 17.5 2 12 2ZM10 17L5 12L6.41 10.59L10 14.17L17.59 6.58L19 8L10 17Z" fill="#246935" />
                        </g>
                    </svg>
                </div>
                
                <div class="mark-paid-text-wrapper">
                    <div class="mark-paid-text-inner">
                        <p class="mark-paid-text">Mark as Paid</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
