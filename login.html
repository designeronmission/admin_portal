<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROJA – Login</title>
    <!-- Fonts & Base CSS -->
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap">
    <!-- Bootstrap + fontawesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="responsive.css" />

    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: #f5f7fa;
        }
        
        .auth-image {
            background: linear-gradient(135deg, #131d58 0%, #1e2a7a 100%);
            height: 100%;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            position: relative;
            overflow: hidden;
        }
        
        .auth-image::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
        }
        
        .auth-image-content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: white;
            max-width: 400px;
        }
        
        .auth-image-content h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .auth-form {
            background: white;
            padding: 48px;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        
        .otp-input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .otp-input {
            width: 50px;
            height: 50px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
            transition: all 0.2s ease;
        }
        
        .otp-input:focus {
            border-color: #131d58;
            box-shadow: 0 0 0 3px rgba(19, 29, 88, 0.1);
            outline: none;
        }
        
        .pin-input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        
        .pin-input {
            width: 55px;
            height: 65px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 600;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            background: white;
        }
        
        .pin-input:focus {
            border-color: #131d58;
            box-shadow: 0 0 0 3px rgba(19, 29, 88, 0.1);
            outline: none;
        }
        
        @media (max-width: 991px) {
            .auth-image {
                display: none;
            }
            .auth-form {
                min-height: auto;
                padding: 32px;
            }
        }
        
        @media (max-width: 576px) {
            .auth-form {
                padding: 24px;
            }
            .otp-input {
                width: 40px;
                height: 40px;
                font-size: 1rem;
            }
            .pin-input {
                width: 45px;
                height: 55px;
                font-size: 1.2rem;
            }
            .otp-input-group, .pin-input-group {
                gap: 8px;
            }
        }
        
        .resend-timer {
            color: #64748b;
            font-size: 0.85rem;
        }
        
        .resend-link {
            color: #131d58;
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }
    </style>

</head>

<body>
    <div class="auth-container">
        <div class="container-fluid p-0">
            <div class="row g-0">
                <!-- Left Side - Image -->
                <div class="col-lg-6">
                    <div class="auth-image">
                        <div class="auth-image-content">
                            <img src="vendor/images/roja-org.png" alt="ROJA" style="height: 60px; margin-bottom: 30px;">
                            <h2 class="text-white">Welcome Back</h2>
                        
                        </div>
                    </div>
                </div>
                
                <!-- Right Side - Form -->
                <div class="col-lg-6">
                    <div class="auth-form">
                        <div class="w-100">
                            <div class="text-center mb-4 d-block d-lg-none">
                                <img src="vendor/images/roja-org.png" alt="ROJA" style="height: 40px;">
                            </div>
                            <h3 class="fw-700 mb-2">Sign In</h3>
                            <p class="text-muted mb-4">Enter your phone number to continue</p>
                            
                            <div id="loginStep1">
                                <div class="mb-4">
                                    <label class="form-label fw-500">Cell Phone Number</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light-1 border-0 rounded-pill-start px-3">+1</span>
                                        <input type="tel" class="form-control rounded-pill-end border-0 bg-light-1 py-3" id="phoneNumber" placeholder="(555) 555-5555">
                                    </div>
                                </div>
                                <button class="btn btn-primary rounded-pill w-100 py-3 fw-500" id="sendOtpBtn">Continue</button>
                                <div class="text-center mt-4">
                                    <p class="text-muted small">Don't have an account? <a href="signup.html" class="text-primary fw-500">Sign Up</a></p>
                                </div>
                            </div>
                            
                            <div id="loginStep2" style="display: none;">
                                <div class="text-center mb-4">
                                    <p class="text-muted">We've sent a verification code to <strong id="phoneDisplay"></strong></p>
                                </div>
                                <div class="otp-input-group mb-4">
                                    <input type="text" class="otp-input" maxlength="1" id="otp1">
                                    <input type="text" class="otp-input" maxlength="1" id="otp2">
                                    <input type="text" class="otp-input" maxlength="1" id="otp3">
                                    <input type="text" class="otp-input" maxlength="1" id="otp4">
                                    <input type="text" class="otp-input" maxlength="1" id="otp5">
                                    <input type="text" class="otp-input" maxlength="1" id="otp6">
                                </div>
                                <div class="text-center mb-4">
                                    <span class="resend-timer" id="timerText">Resend code in <span id="timer">60</span>s</span>
                                    <a href="#" class="resend-link" id="resendLink" style="display: none;">Resend Code</a>
                                </div>
                                <button class="btn btn-primary rounded-pill w-100 py-3 fw-500" id="verifyOtpBtn">Verify OTP</button>
                                <button class="btn btn-link w-100 mt-3" id="backToPhoneBtn">← Back to phone number</button>
                            </div>
                            
                            <div id="loginStep3" style="display: none;">
                                <div class="text-center mb-4">
                                    <i class="fas fa-key text-primary fa-2x mb-3"></i>
                                    <h5 class="fw-600">Enter Your PIN</h5>
                                    <p class="text-muted small">Enter your 4-digit security PIN</p>
                                </div>
                                <div class="pin-input-group mb-4">
                                    <input type="password" class="pin-input" maxlength="1" id="pin1">
                                    <input type="password" class="pin-input" maxlength="1" id="pin2">
                                    <input type="password" class="pin-input" maxlength="1" id="pin3">
                                    <input type="password" class="pin-input" maxlength="1" id="pin4">
                                </div>
                                <button class="btn btn-primary rounded-pill w-100 py-3 fw-500" id="verifyPinBtn">Verify PIN</button>
                                <button class="btn btn-link w-100 mt-3" id="forgotPinBtn">Forgot PIN?</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            let userPhone = '';
            
            // OTP inputs
            const otpInputs = ['otp1', 'otp2', 'otp3', 'otp4', 'otp5', 'otp6'];
            otpInputs.forEach((id, index) => {
                const input = document.getElementById(id);
                input.addEventListener('keyup', function(e) {
                    if (this.value.length === 1 && index < otpInputs.length - 1) {
                        document.getElementById(otpInputs[index + 1]).focus();
                    }
                    if (e.key === 'Backspace' && !this.value && index > 0) {
                        document.getElementById(otpInputs[index - 1]).focus();
                    }
                });
            });
            
            // PIN inputs
            const pinInputs = ['pin1', 'pin2', 'pin3', 'pin4'];
            pinInputs.forEach((id, index) => {
                const input = document.getElementById(id);
                input.addEventListener('keyup', function(e) {
                    if (this.value.length === 1 && index < pinInputs.length - 1) {
                        document.getElementById(pinInputs[index + 1]).focus();
                    }
                    if (e.key === 'Backspace' && !this.value && index > 0) {
                        document.getElementById(pinInputs[index - 1]).focus();
                    }
                });
            });
            
            // Send OTP
            document.getElementById('sendOtpBtn').addEventListener('click', function() {
                const phone = document.getElementById('phoneNumber').value;
                if (!phone) {
                    alert('Please enter your phone number');
                    return;
                }
                userPhone = phone;
                document.getElementById('phoneDisplay').innerText = phone;
                document.getElementById('loginStep1').style.display = 'none';
                document.getElementById('loginStep2').style.display = 'block';
                startTimer();
            });
            
            // Back to phone
            document.getElementById('backToPhoneBtn').addEventListener('click', function() {
                document.getElementById('loginStep2').style.display = 'none';
                document.getElementById('loginStep1').style.display = 'block';
                clearInterval(timerInterval);
            });
            
            // Verify OTP
            document.getElementById('verifyOtpBtn').addEventListener('click', function() {
                let otp = '';
                otpInputs.forEach(id => otp += document.getElementById(id).value);
                if (otp.length === 6) {
                    document.getElementById('loginStep2').style.display = 'none';
                    document.getElementById('loginStep3').style.display = 'block';
                    // Clear PIN inputs
                    pinInputs.forEach(id => document.getElementById(id).value = '');
                    document.getElementById('pin1').focus();
                } else {
                    alert('Please enter the complete 6-digit OTP');
                }
            });
            
            // Verify PIN
            document.getElementById('verifyPinBtn').addEventListener('click', function() {
                let pin = '';
                pinInputs.forEach(id => pin += document.getElementById(id).value);
                if (pin.length === 4) {
                    alert('Login successful!');
                    window.location.href = 'dashboard.html';
                } else {
                    alert('Please enter your 4-digit PIN');
                }
            });
            
            // Forgot PIN
            document.getElementById('forgotPinBtn').addEventListener('click', function() {
                alert('PIN reset functionality will be available soon. Please contact support.');
            });
            
            // Timer functionality
            let timerInterval;
            function startTimer() {
                let timeLeft = 60;
                const timerSpan = document.getElementById('timer');
                const resendLink = document.getElementById('resendLink');
                const timerText = document.getElementById('timerText');
                
                if (timerInterval) clearInterval(timerInterval);
                timerText.style.display = 'inline';
                resendLink.style.display = 'none';
                
                timerInterval = setInterval(() => {
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        timerText.style.display = 'none';
                        resendLink.style.display = 'inline';
                    } else {
                        timerSpan.textContent = timeLeft;
                        timeLeft--;
                    }
                }, 1000);
            }
            
            // Resend code
            document.getElementById('resendLink').addEventListener('click', function(e) {
                e.preventDefault();
                startTimer();
                this.style.display = 'none';
                document.getElementById('timerText').style.display = 'inline';
                alert('A new verification code has been sent to your phone.');
            });
        });
    </script>
</body>

</html>
